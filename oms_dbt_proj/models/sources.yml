version: 2

sources:
  - name: L1_LANDING
    description: "Raw landing layer containing source data from the Order Management System."
    schema: L1_LANDING
    tables:
      - name: orders
        description: "Raw orders table from OMS source system."
        columns:
          - name: ORDERID
            description: "Unique identifier for each order"
            tests:
              - unique
              - not_null
          - name: ORDERDATE
            description: "Date the order was placed"
            tests:
              - not_null
          - name: CUSTOMERID
            description: "Foreign key referencing the customers table"
            tests:
              - not_null
          - name: EMPLOYEEID
            description: "ID of employee who processed the order"
          - name: STOREID
            description: "ID of store where order was placed"
          - name: STATUS
            description: "Raw status code (01=In Progress, 02=Completed, 03=Cancelled)"
            tests:
              - not_null
              - accepted_values:
                  values: ['01', '02', '03']
          - name: UPDATED_AT
            description: "Timestamp of last record update in source system"

      - name: customers
        description: "Raw customers table from OMS source system."
        columns:
          - name: CUSTOMERID
            description: "Unique identifier for each customer"
            tests:
              - unique
              - not_null
          - name: FIRSTNAME
            description: "Customer first name"
            tests:
              - not_null
          - name: LASTNAME
            description: "Customer last name"
            tests:
              - not_null
          - name: EMAIL
            description: "Customer email address"
            tests:
              - not_null
          - name: PHONE
            description: "Customer phone number"
          - name: ADDRESS
            description: "Customer street address"
          - name: CITY
            description: "Customer city"
          - name: STATE
            description: "Customer state"
          - name: ZIPCODE
            description: "Customer zip code"
          - name: UPDATED_AT
            description: "Timestamp of last record update in source system"

      - name: orderitems
        description: "Raw order line items table from OMS source system."
        columns:
          - name: ORDERITEMID
            description: "Unique identifier for each order line item"
            tests:
              - unique
              - not_null
          - name: ORDERID
            description: "Foreign key referencing the orders table"
            tests:
              - not_null
          - name: PRODUCTID
            description: "ID of the product ordered"
            tests:
              - not_null
          - name: QUANTITY
            description: "Number of units ordered"
            tests:
              - not_null
          - name: UNITPRICE
            description: "Price per unit at time of order"
            tests:
              - not_null
          - name: UPDATED_AT
            description: "Timestamp of last record update in source system"
